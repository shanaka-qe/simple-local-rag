# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Evaluate the local RAG with promptfoo — fully local, declarative tests.
#
# The anatomy of a promptfoo config (the principles):
#   prompts      what gets sent to the provider (here, just the question)
#   providers    what produces the answer (here, our real RAG via a Python provider)
#   defaultTest  options shared by all tests — incl. the judge for model-graded checks
#   tests        a list of cases; each has `vars` (inputs) + `assert` (the checks)
#
# Run from the repo root (build the index first if needed):
#   uv run python -c "from utils import process_documents_folder; process_documents_folder()"
#   PROMPTFOO_PYTHON="$PWD/.venv/bin/python" npx -y promptfoo@latest eval -c eval/promptfoo/promptfooconfig.yaml
#   npx -y promptfoo@latest view

description: Local RAG evaluation

# 1) The prompt template. {{query}} is filled from each test's vars.query.
#    (context-faithfulness requires the user question to live in a `query` var.)
prompts:
  - "{{query}}"

# 2) The provider: a custom Python script that runs the real RAG (retrieve + generate).
#    It returns {"output": answer, "metadata": {"contexts": [...]}} — the retrieved
#    chunks travel in metadata so the grounding check below can see them.
providers:
  - id: file://rag_provider.py
    label: local-rag

# 3) Shared options: route model-graded checks to the LOCAL Ollama model,
#    so grading needs no API key and nothing leaves the machine.
defaultTest:
  options:
    provider:
      text:
        id: ollama:chat:llama3.1:8b
        config:
          temperature: 0.1

# 4) The test cases. Each case: a question (vars) + the checks to run (assert).
#    Three kinds of assertion used here:
#      - icontains             deterministic: does the answer contain this substring?
#      - context-faithfulness  model-graded: is the answer supported by the RETRIEVED
#                              chunks? The chunks are pulled from the provider's
#                              metadata via `contextTransform` so the judge actually
#                              sees them (a plain llm-rubric does NOT receive them).
#      - llm-rubric            model-graded: free-form judgement (used for the
#                              "should decline" honesty checks, which need no context)
tests:
  # ---------- Nimbus Audio support policy ----------
  - description: refund-window
    vars:
      query: "What is the refund window in the returns policy?"
    assert:
      - type: icontains
        value: "30 days"
        metric: contains-fact
      - type: context-faithfulness
        contextTransform: 'context.metadata.contexts.join("\n\n")'
        # threshold 0 = informational: the faithfulness score is still computed and
        # shown, but it does NOT gate the suite. A local judge can't grade
        # claim-based faithfulness reliably (see README); `contains-fact` is the gate.
        threshold: 0
        metric: grounded

  - description: warranty-length
    vars:
      query: "How long is the standard warranty?"
    assert:
      - type: icontains
        value: "24 months"
        metric: contains-fact
      - type: context-faithfulness
        contextTransform: 'context.metadata.contexts.join("\n\n")'
        # threshold 0 = informational: the faithfulness score is still computed and
        # shown, but it does NOT gate the suite. A local judge can't grade
        # claim-based faithfulness reliably (see README); `contains-fact` is the gate.
        threshold: 0
        metric: grounded

  - description: support-email
    vars:
      query: "What is the Nimbus Audio support email address?"
    assert:
      - type: icontains
        value: "support@nimbus-audio.example"
        metric: contains-fact
      - type: context-faithfulness
        contextTransform: 'context.metadata.contexts.join("\n\n")'
        # threshold 0 = informational: the faithfulness score is still computed and
        # shown, but it does NOT gate the suite. A local judge can't grade
        # claim-based faithfulness reliably (see README); `contains-fact` is the gate.
        threshold: 0
        metric: grounded

  # ---------- Project Meridian mission report ----------
