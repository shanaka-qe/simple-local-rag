  # ---------- Unanswerable: the documents do not contain this information ----------
  # A good RAG should decline rather than invent an answer. "Did it decline?" can be
  # judged from the answer alone, so a plain llm-rubric (no context) is fine here.
  # These may FAIL today — that is the harness surfacing a real weakness to fix later.
  - description: nimbus-ceo-salary
    vars:
      query: "What is the salary of Nimbus Audio's CEO?"
    assert:
      - type: llm-rubric
        value: "The answer declines or states the information is not in the documents. It must NOT invent a specific figure, name, or fact."
        metric: declines-unknown

  - description: meridian-crew-names
    vars:
      query: "What are the names of every crew member on the RV Deepcurrent?"
    assert:
      - type: llm-rubric
        value: "The answer declines or states the information is not in the documents. It must NOT invent specific names."
        metric: declines-unknown
