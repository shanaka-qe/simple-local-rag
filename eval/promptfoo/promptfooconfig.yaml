  # ---------- Quantum Computing Research Laboratory report ----------
  - description: quantum-director
    vars:
      query: "Who is the research director of the Quantum Computing Research Laboratory?"
    assert:
      - type: icontains
        value: "Elena Rodriguez"
        metric: contains-fact
      - type: context-faithfulness
        contextTransform: 'context.metadata.contexts.join("\n\n")'
        # threshold 0 = informational: the faithfulness score is still computed and
        # shown, but it does NOT gate the suite. A local judge can't grade
        # claim-based faithfulness reliably (see README); `contains-fact` is the gate.
        threshold: 0
        metric: grounded

  - description: quantum-focus
    vars:
      query: "What is the laboratory's research focus?"
    assert:
      - type: icontains
        value: "Topological Quantum Error Correction"
        metric: contains-fact
      - type: context-faithfulness
        contextTransform: 'context.metadata.contexts.join("\n\n")'
        # threshold 0 = informational: the faithfulness score is still computed and
        # shown, but it does NOT gate the suite. A local judge can't grade
