# Golden evaluation dataset for the Local RAG system.
#
# A fixed set of test cases used to measure quality repeatably. The eval tools
# (promptfoo, DeepEval, Ragas) all read from this file.
#
# Fields per case:
#   id                a short, unique identifier
#   question          the question to ask the RAG
#   answerable        true if the answer is in the documents; false if it is not
#   expected_answer   the ground-truth answer (used as reference by judges)
#   expected_contains substrings the generated answer should contain (deterministic check)
#   expected_context  a unique document marker that should appear in the retrieved chunks
#                     (null for unanswerable cases — nothing should match well)
#
# All source documents are synthetic; no real or private data.

cases:
  # --- Nimbus Audio support policy ---
  - id: refund-window
    question: "What is the refund window in the returns policy?"
    answerable: true
    expected_answer: "The refund window is 30 days from the delivery date."
    expected_contains: ["30 days"]
    expected_context: "NIMBUS_SUPPORT_MARKER_5183"

  - id: warranty-length
    question: "How long is the standard warranty?"
    answerable: true
    expected_answer: "The standard warranty is 24 months from the date of purchase."
    expected_contains: ["24 months"]
    expected_context: "NIMBUS_SUPPORT_MARKER_5183"

  - id: support-email
    question: "What is the Nimbus Audio support email address?"
    answerable: true
    expected_answer: "The support email is support@nimbus-audio.example."
    expected_contains: ["support@nimbus-audio.example"]
    expected_context: "NIMBUS_SUPPORT_MARKER_5183"

  # --- Project Meridian mission report ---
  - id: meridian-lead
    question: "Who is the lead scientist on Project Meridian?"
    answerable: true
    expected_answer: "The lead scientist is Dr. Hana Okafor."
    expected_contains: ["Hana Okafor"]
    expected_context: "MERIDIAN_OCEAN_MARKER_6207"

  - id: meridian-depth
    question: "What was the maximum dive depth recorded?"
    answerable: true
    expected_answer: "The maximum dive depth recorded was 4,812 metres."
    expected_contains: ["4,812"]
    expected_context: "MERIDIAN_OCEAN_MARKER_6207"

  - id: meridian-budget
    question: "What was the total mission budget for Project Meridian?"
    answerable: true
    expected_answer: "The total mission budget was $28.4 million USD."
    expected_contains: ["28.4 million"]
    expected_context: "MERIDIAN_OCEAN_MARKER_6207"

  - id: meridian-mission-code
    question: "What is the mission code for Project Meridian?"
    answerable: true
    expected_answer: "The mission code is PM-2026-ABYSS."
    expected_contains: ["PM-2026-ABYSS"]
    expected_context: "MERIDIAN_OCEAN_MARKER_6207"

  # --- Quantum Computing Research Laboratory report ---
  - id: quantum-director
    question: "Who is the research director of the Quantum Computing Research Laboratory?"
    answerable: true
    expected_answer: "The research director is Prof. Elena Rodriguez."
    expected_contains: ["Elena Rodriguez"]
    expected_context: "QCR-LAB-9847"

  - id: quantum-focus
    question: "What is the laboratory's research focus?"
    answerable: true
    expected_answer: "The research focus is Topological Quantum Error Correction."
    expected_contains: ["Topological Quantum Error Correction"]
    expected_context: "QCR-LAB-9847"

  - id: quantum-budget
    question: "What is the annual budget of the Quantum Computing Research Laboratory?"
    answerable: true
    expected_answer: "The annual budget is $15.7 million."
    expected_contains: ["15.7 million"]
    expected_context: "QCR-LAB-9847"

  # --- Unanswerable: the documents do not contain this information ---
  # A good RAG should decline rather than invent an answer.
  - id: nimbus-ceo-salary
    question: "What is the salary of Nimbus Audio's CEO?"
    answerable: false
    expected_answer: "The documents do not contain this information."
    expected_contains: []
    expected_context: null

  - id: meridian-crew-names
    question: "What are the names of every crew member on the RV Deepcurrent?"
    answerable: false
    expected_answer: "The documents do not contain this information."
    expected_contains: []
    expected_context: null
